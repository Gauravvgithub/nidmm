<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>Pop Up - Using Javascript</title>

<body>

  <!--  -->
  <h1>
    jQuery popup CSS with YouTube video</h1>
  <button id="popup__toggle">Open popup!</button>
  <div class="popup__overlay">
    <div class="popup">
      <a href="#" class="popup__close">X</a>

      <form action="">
        <input type="email" placeholder="email ">
        <input type="email" placeholder="email ">
        <input type="email" placeholder="email ">
        <input type="email" placeholder="email ">
        <input type="email" placeholder="email ">
        <input type="email" placeholder="email ">
      </form>
    </div>
  </div>

  <script src='http://ajax.googleapis.com/ajax/libs/jquery/1.6.4/jquery.min.js?ver=1.6.4'
    type='text/javascript'> </script>

  <style>
    html {
      min-height: 100%;
    }

    body {
      min-height: 100%;
      background: #fff;
      font: 14px/125% Tahoma;
      text-align: center;
    }

    .popup__overlay {
      display: none;
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(4, 174, 255, 0.95);
      text-align: center;
      z-index: 100;

    }

    .popup__overlay:after {
      display: inline-block;
      height: 100%;
      width: 0;
      vertical-align: middle;
      content: "";
    }

    .popup {
      display: inline-block;
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 640px;
      max-height: 480px;
      padding: 20px;
      border: 1px solid black;
      background: #C8102E;
      color: #fff;
      vertical-align: middle;
    }

    .popup-form__row {
      margin: 1em 0;

    }

    .popup__close {
      display: block;
      position: absolute;
      top: 1px;
      right: 1px;
      width: 12px;
      height: 12px;
      padding: 8px;
      cursor: pointer;
      text-align: center;
      font-size: 20px;
      line-height: 12px;
      color: #ffff00;
      text-decoration: none;
      font-weight: bold;
    }

    iframe {
      width: 100%;
      height: 100%;
      outline: 1px solid #C8102E;
    }

    /* other styles */

    button {
      border: none;
      padding: 0.5em;
      background-color: #C8102E;
      font-size: 1.4em;
      color: #fff;

    }

    ul {
      text-align: left;
      display: inline-block;
    }
  </style>




  <script>
    var player = null;
    var tag = document.createElement("script");
    tag.id = "iframe-api";
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName("script")[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("existing-iframe-example");
    }

    var elPopupClose = $(".popup__close");
    var elPopupOverlay = $(".popup__overlay");
    var elPopupToggle = $("#popup__toggle");

    // @see https://developers.google.com/youtube/iframe_api_reference#Playback_controls
    // @see http://stackoverflow.com/questions/8667882/how-to-pause-a-youtube-player-when-hiding-the-iframe
    function popupDidClose() {
      if (player !== null) {
        player.pauseVideo();
      }
    }

    elPopupClose.click(function () {
      elPopupOverlay.css({ display: "none", visibility: "hidden", opacity: 0 });
      popupDidClose();
    });

    elPopupOverlay.click(function (event) {
      event = event || window.event;
      if (event.target === this) {
        elPopupOverlay.css({ display: "none", visibility: "hidden", opacity: 0 });
        popupDidClose();
      }
    });

    elPopupToggle.click(function () {
      elPopupOverlay.css({ display: "block", visibility: "visible", opacity: 1 });
    });

  </script>
